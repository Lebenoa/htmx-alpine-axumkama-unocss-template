<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <meta name="description" content="{{ description }}">
    {% for (name, content) in meta_tags %}
    <meta name="{{ name }}" content="{{ content }}">
    {% endfor %}
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta2"
        integrity="sha384-v+EMKtNUAo5enmQxBqgoU/FWvVvvZHvITNzurHSl4kzvCs94wdlgHUci1lliKWKz"
        crossorigin="anonymous"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/public/styles.css">
</head>

<body hx-boost:inherited='target:"#main-content"'>
    <nav class="flex flex-row w-full">
        <a href="/">Logo</a>
        <ul class="ml-4 flex flex-row gap-4">
            <li><a href="/dashboard">Dashboard</a></li>
        </ul>
    </nav>

    <div class="layout">
        <aside class="sidebar">
            <!-- Sidebar content -->
        </aside>

        <main id="main-content">
            {{ content | safe }}
        </main>
    </div>

    <footer>
        <p>&copy; 2026 My App</p>
    </footer>
    <script>
        function nullGuard(value, callback) {
            if (value == null) {
                return
            }
            return callback(value);
        }
        function afterRequest(evt) {
            const newTitle = evt.detail.ctx.response.headers.get("x-page-title");
            if (newTitle != null) {
                document.title = newTitle;
            }
            const newMetaTags = evt.detail.ctx.response.headers.get("x-page-meta-tags");
            if (newMetaTags != null) {
                const parsedMetaTags = JSON.parse(newMetaTags);
                const entries = Object.entries(parsedMetaTags);
                const allMetas = document.querySelectorAll("meta");
                for (let i = 0; i < allMetas.length; i++) {
                    allMetas[i].remove();
                }

                for (let i = 0; i < entries.length; i++) {
                    const meta = document.createElement("meta");
                    meta.name = entries[i][0];
                    meta.content = entries[i][1];
                    document.head.appendChild(meta);
                }
            }
            const newDescription = evt.detail.ctx.response.headers.get("x-page-description");
            if (newDescription != null) {
                const meta = document.createElement("meta");
                meta.name = "description";
                meta.content = description;
                document.head.appendChild(meta);
            }
        }
        htmx.on("htmx:after:request", afterRequest);
    </script>
</body>

</html>
